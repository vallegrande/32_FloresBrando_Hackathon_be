spring:
  application:
    name: demo
  datasource:
    url: ${DATABASE_URL:jdbc:sqlserver://localhost:1433;databaseName=EduFuturo;encrypt=true;trustServerCertificate=true;}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:Sql2026.Docker}
    driver-class-name: ${DATABASE_DRIVER:com.microsoft.sqlserver.jdbc.SQLServerDriver}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
  jackson:
    time-zone: America/Lima

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
